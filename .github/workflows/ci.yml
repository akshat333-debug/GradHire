name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: gradhire_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      GRADHIRE_DB_URL: jdbc:mysql://127.0.0.1:3306/gradhire_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      GRADHIRE_DB_USERNAME: root
      GRADHIRE_DB_PASSWORD: root
      GRADHIRE_DB_DRIVER: com.mysql.cj.jdbc.Driver

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: maven

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            mysqladmin ping -h 127.0.0.1 -uroot -proot && exit 0
            sleep 2
          done
          exit 1

      - name: Initialize schema
        run: mysql -h 127.0.0.1 -uroot -proot gradhire_db < "$GITHUB_WORKSPACE/sql/schema.sql"

      - name: Run tests
        run: mvn -B test
